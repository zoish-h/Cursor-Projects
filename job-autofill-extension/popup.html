<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Job Autofill</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        padding: 10px 12px;
        min-width: 280px;
        max-width: 340px;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 8px;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 6px;
      }
      .switch {
        position: relative;
        display: inline-block;
        width: 38px;
        height: 20px;
      }
      .switch input {
        display: none;
      }
      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #ccc;
        transition: 0.2s;
        border-radius: 20px;
      }
      .slider:before {
        position: absolute;
        content: "";
        height: 16px;
        width: 16px;
        left: 2px;
        bottom: 2px;
        background-color: white;
        transition: 0.2s;
        border-radius: 50%;
      }
      input:checked + .slider {
        background-color: #0b8043;
      }
      input:checked + .slider:before {
        transform: translateX(18px);
      }
      #search {
        width: 100%;
        box-sizing: border-box;
        padding: 4px 6px;
        margin: 6px 0;
        font-size: 12px;
      }
      #sites {
        max-height: 260px;
        overflow-y: auto;
        margin-top: 4px;
        font-size: 12px;
      }
      .site {
        border-top: 1px solid #eee;
        padding-top: 4px;
        margin-top: 4px;
      }
      .site-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .site-title {
        font-weight: 600;
      }
      .site-actions button {
        font-size: 11px;
        padding: 2px 6px;
        margin-left: 4px;
      }
      .field {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 3px;
      }
      .field-label {
        flex: 1;
        margin-right: 4px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .field button {
        font-size: 10px;
        padding: 1px 4px;
      }
      small {
        font-size: 10px;
        color: #777;
      }
    </style>
  </head>
  <body>
    <h1>Job Application Autofill</h1>

    <div class="row">
      <span>Global auto-fill</span>
      <label class="switch">
        <input type="checkbox" id="globalToggle" />
        <span class="slider"></span>
      </label>
    </div>

    <input
      type="text"
      id="search"
      placeholder="Search by site or field label..."
    />

    <div id="sites"></div>

    <small>Data is stored locally in your browser only.</small>

    <script src="popup.js"></script>
  </body>
</html>
